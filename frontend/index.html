<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Learning Checkers</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>Checkers <span>Deep Learning Engine</span></h1>
      <p class="subtitle">Play against a neural network bot trained via Monte Carlo Tree Search</p>
    </header>

    <main class="game-area">
      <div class="board-column" style="display: flex; flex-direction: column; gap: 1rem;">
        <div class="board-container">
          <!-- Generates 8x8 Board Grid via JS -->
          <div id="checkers-board" class="board"></div>
        </div>
        
        <!-- Win Probability Bar -->
        <div class="prob-container glassmorphism" style="padding: 1rem; border-radius: 12px; min-width: unset;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600;">
            <span style="color: var(--primary-color);">Red Advantage</span>
            <span style="color: var(--text-secondary);" id="prob-text">50% / 50%</span>
            <span style="color: #e0e0e0;">White Advantage</span>
          </div>
          <div class="prob-bar-bg" style="width: 100%; height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; position: relative;">
            <div id="prob-bar-fill" style="width: 50%; height: 100%; background: linear-gradient(90deg, var(--primary-color), #ff6b8b); transition: width 0.5s ease;"></div>
          </div>
        </div>
      </div>

      <aside class="control-panel glassmorphism">
        <div class="status-box">
          <h2>Game Status</h2>
          <p id="game-status-text">Waiting to Start</p>
        </div>

        <div class="controls">
          <div class="player-config" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <div style="flex: 1;">
              <label style="font-size: 0.8rem; display: block; margin-bottom: 0.3rem;">Red Player (P1)</label>
              <select id="p1-select" class="dropdown">
                <option value="human">Human</option>
              </select>
            </div>
            <div style="flex: 1;">
              <label style="font-size: 0.8rem; display: block; margin-bottom: 0.3rem;">White Player (P2)</label>
              <select id="p2-select" class="dropdown">
                <option value="bot_v1_baseline">Bot V1 Baseline (Loading...)</option>
              </select>
            </div>
          </div>
          
          <div style="display: flex; gap: 1rem;">
             <button id="btn-start" class="btn primary" style="flex: 2;">Start Match</button>
             <button id="btn-tourney" class="btn" style="flex: 1; background: rgba(255,255,255,0.1); color: white;">Run Tourney</button>
          </div>
          
          <div class="slider-group">
            <div class="slider-header">
              <label for="temperature-slider">Bot Temperature (τ)</label>
              <span id="temp-value" class="badge">0.5</span>
            </div>
            <input type="range" id="temperature-slider" min="0" max="2" step="0.1" value="0.5">
            <p class="help-text">Controls stochasticity. 0 = Greedy Play, >1 = Random/Exploratory</p>
          </div>
          
          <div class="slider-group" style="padding-top: 0.5rem; border-top: none;">
            <div class="slider-header">
              <label for="depth-slider">MCTS Search Depth (# Sims)</label>
              <span id="depth-value" class="badge">50</span>
            </div>
            <input type="range" id="depth-slider" min="10" max="500" step="10" value="50">
          </div>
          
          <div class="legend" style="align-items: center; justify-content: space-between;">
            <div style="display: flex; gap: 1.5rem;">
                <div class="legend-item"><div class="piece p1"></div><span id="legend-p1-text">Red</span></div>
                <div class="legend-item"><div class="piece p2"></div><span id="legend-p2-text">White</span></div>
            </div>
          </div>
          
          <div class="history-panel" style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
            <h3 style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase;">Review Past Moves</h3>
            <div class="history-controls" style="display: flex; gap: 0.5rem; justify-content: center;">
              <button id="btn-prev" class="btn" style="flex: 1; padding: 6px; font-size: 0.8rem;" disabled>Prev</button>
              <button id="btn-current" class="btn primary" style="flex: 1; padding: 6px; font-size: 0.8rem;" disabled>Live</button>
              <button id="btn-next" class="btn" style="flex: 1; padding: 6px; font-size: 0.8rem;" disabled>Next</button>
            </div>
          </div>
        </div>

        <div id="loading-overlay" class="hidden">
          <div class="spinner"></div>
          <p>Bot is thinking...</p>
        </div>
      </aside>
    </main>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
